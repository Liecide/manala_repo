<!DOCTYPE html>
<html lang="en">
<head>

<title>Manala v16</title>
<style>
body{margin:0;background:#798056;font-family:Georgia,serif;color:#1e1a12}

</div>
<div id="wrap">
  <canvas id="game" width="1500" height="950"></canvas>
</div>
<div id="note">

  - bigger sprites and denser village composition<br>
